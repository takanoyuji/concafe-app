services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_URL: https://vliverlab.com
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - db-data:/data
      - ./cast-images:/app/public/images/cast
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1

volumes:
  db-data:
