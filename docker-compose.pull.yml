# サーバ用: ビルドせずイメージの pull（または load）と up のみで起動
# 使い方: docker compose -f docker-compose.pull.yml pull && docker compose -f docker-compose.pull.yml up -d

services:
  app:
    image: takanodocker/vliverlab-hp:latest
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - app_data:/data
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/dev.db

volumes:
  app_data:
