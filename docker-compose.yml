services:
  app:
    build:
      context: .
      args:
        # .env の NEXT_PUBLIC_GA_ID をビルド時に渡す（未設定ならGAは読み込まない）
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
    ports:
      - "3000:3000"
    volumes:
      # キャスト画像・DBの永続化（コンテナ再作成しても消えない）
      - app_data:/data
    env_file: .env
    restart: unless-stopped

volumes:
  app_data:
