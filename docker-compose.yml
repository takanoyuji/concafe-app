# 手元（WSL/ローカル）でビルド・起動する用
# 事前に .env を用意し、NEXT_PUBLIC_BASE_URL 等を設定すること（README / DEPLOY.md 参照）

name: vliverlab-hp

services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
    image: takanodocker/vliverlab-hp:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # DB・アップロードファイル（コンテナ再作成でも消えない）
      - app_data:/data
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/dev.db
      - CAST_IMAGE_DIR=/data/cast

volumes:
  app_data:
